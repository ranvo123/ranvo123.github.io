const NS = "thedesk:";
let __uid = null;     // signed-in user id (cloud mode)
let __cache = null;   // hydrated key/value cache for the signed-in user
async function hydrateStore(uid) {
  __uid = uid; __cache = {};
  if (BACKEND && uid) {
    try {
      const { data } = await supa.from("kv").select("key,value").eq("user_id", uid);
      (data || []).forEach((row) => { __cache[row.key] = row.value; });
    } catch (e) { console.error("hydrate failed", e); }
  }
}
function clearStore() { __uid = null; __cache = null; }
function loadKey(key, fallback) {
  if (BACKEND) {
    if (__cache && Object.prototype.hasOwnProperty.call(__cache, key)) return __cache[key];
    return fallback;
  }
  try { const v = localStorage.getItem(NS + key); return v == null ? fallback : JSON.parse(v); }
  catch (e) { return fallback; }
}
function saveKey(key, value) {
  if (BACKEND) {
    if (__cache) __cache[key] = value;
    if (__uid) {
      supa.from("kv").upsert({ user_id: __uid, key: key, value: value }, { onConflict: "user_id,key" })
        .then(({ error }) => { if (error) console.error("save failed", error); });
    }
    return;
  }
  try { localStorage.setItem(NS + key, JSON.stringify(value)); }
  catch (e) { console.error("save failed", e); }
}

/* Free, in-browser AI (WebLLM) — loads lazily, only when used. */
const LLM_MODEL = "Llama-3.2-3B-Instruct-q4f16_1-MLC";
let __engine = null, __enginePromise = null;
const webgpuOK = () => typeof navigator !== "undefined" && !!navigator.gpu;
async function ensureEngine(onProgress) {
  if (__engine) return __engine;
  if (!webgpuOK()) throw new Error("nogpu");
  if (!__enginePromise) {
    __enginePromise = import("https://esm.run/@mlc-ai/web-llm")
      .then((webllm) => webllm.CreateMLCEngine(LLM_MODEL, {
        initProgressCallback: (r) => { try { if (onProgress) onProgress(r); } catch (e) {} },
      }))
      .then((e) => { __engine = e; return e; })
      .catch((e) => { __enginePromise = null; throw e; });
  }
  return __enginePromise;
}

const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
const todayISO = () => new Date().toISOString().slice(0, 10);
const fmtMoney = (n, cur = "USD") => {
  const sym = CURRENCIES[cur] || "$";
  const num = Number(n || 0);
  return sym + num.toLocaleString(undefined, { minimumFractionDigits: num % 1 ? 2 : 0, maximumFractionDigits: 2 });
};
const fmtDate = (iso) => {
  if (!iso) return "—";
  const d = new Date(iso + "T00:00:00");
  return d.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
};
const effectiveStatus = (d) => {
  if (d.status === "invoiced" && d.dueDate && d.dueDate < todayISO()) return "overdue";
  return d.status;
};
const workLabel = (v) => (WORK_TYPES.find((w) => w.v === v) || {}).l || v;

// Hash the passcode so it isn't stored in plain text. Note: this is a
// convenience lock for local app data, not a substitute for server-side auth.
async function hashPw(pw) {
  try {
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pw));
    return Array.from(new Uint8Array(buf)).map((b) => b.toString(16).padStart(2, "0")).join("");
  } catch (e) {
    let h = 0;
    for (let i = 0; i < pw.length; i++) { h = (h << 5) - h + pw.charCodeAt(i); h |= 0; }
    return "f" + (h >>> 0).toString(16);
  }
}
const validEmail = (e) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e.trim());

/* ================================================================ */
function App() {
  const [loading, setLoading] = useState(true);
  const [profile, setProfile] = useState(null);
  const [deals, setDeals] = useState([]);
  const [tab, setTab] = useState("ledger");
  const [query, setQuery] = useState("");
  const [filter, setFilter] = useState("all");
  const [editing, setEditing] = useState(null);     // deal object or {} for new
  const [invoiceFor, setInvoiceFor] = useState(null);
  const [showProfile, setShowProfile] = useState(false);
  const [royalties, setRoyalties] = useState([]);
  const [royaltyEditing, setRoyaltyEditing] = useState(null);
  const [account, setAccount] = useState(null);   // { email, name, passwordHash }
  const [session, setSession] = useState(false);  // signed in this device
  const [estRates, setEstRates] = useState(DEFAULT_RATES);
  const [estShare, setEstShare] = useState(100);
  const [contractText, setContractText] = useState("");
  const [contractResult, setContractResult] = useState(null);
  const [pendingEmail, setPendingEmail] = useState("");
  const [justRegistered, setJustRegistered] = useState(false);
  const [authMode, setAuthMode] = useState("landing");  // landing | login | register
  const [recovery, setRecovery] = useState(false);

  const refreshFromStore = () => {
    setProfile(loadKey("producerProfile", null));
    setDeals(loadKey("deals", []));
    setRoyalties(loadKey("royalties", []));
    setEstRates({ ...DEFAULT_RATES, ...loadKey("estimatorRates", DEFAULT_RATES) });
    setEstShare(loadKey("estimatorShare", 100));
  };

  useEffect(() => {
    (async () => {
      if (BACKEND) {
        try {
          const { data } = await supa.auth.getSession();
          const sess = data && data.session;
          if (sess && sess.user) {
            await hydrateStore(sess.user.id);
            setAccount({ email: sess.user.email, name: (sess.user.user_metadata && sess.user.user_metadata.name) || "" });
            setSession(true);
          }
        } catch (e) { console.error(e); }
      } else {
        const acc = loadKey("authAccount", null);
        const sess = loadKey("authSession", false);
        setAccount(acc);
        setSession(Boolean(sess) && Boolean(acc));
      }
      refreshFromStore();
      setLoading(false);
    })();
    if (BACKEND) {
      const out = supa.auth.onAuthStateChange((event) => { if (event === "PASSWORD_RECOVERY") setRecovery(true); });
      return () => { try { out.data.subscription.unsubscribe(); } catch (e) {} };
    }
  }, []);

  const updateRates = (next) => { setEstRates(next); saveKey("estimatorRates", next); };
  const updateShare = (v) => { setEstShare(v); saveKey("estimatorShare", v); };

  const onRegister = async ({ name, email, password }) => {
    if (BACKEND) {
      const { error } = await supa.auth.signUp({ email: email.trim(), password: password, options: { data: { name: name } } });
      if (error) return error.message;
      setPendingEmail(email.trim());
      setJustRegistered(true);
      setAuthMode("login");
      return null;
    }
    const passwordHash = await hashPw(password);
    const acc = { name, email: email.trim(), passwordHash, createdAt: Date.now() };
    const p = profile
      ? { ...profile, producerName: profile.producerName || name, email: profile.email || email.trim() }
      : { producerName: name, businessName: "", email: email.trim(), currency: "USD", paymentDetails: "" };
    setProfile(p); saveKey("producerProfile", p);
    setPendingEmail(email.trim());
    setJustRegistered(true);
    setSession(false); saveKey("authSession", false);
    setAccount(acc); saveKey("authAccount", acc);
    setAuthMode("login");
    return null;
  };
  const onLogin = async ({ email, password, remember }) => {
    if (BACKEND) {
      const { data, error } = await supa.auth.signInWithPassword({ email: email.trim(), password: password });
      if (error) return error.message;
      const u = data.user;
      await hydrateStore(u.id);
      if (!loadKey("producerProfile", null)) {
        saveKey("producerProfile", { producerName: (u.user_metadata && u.user_metadata.name) || "", businessName: "", email: u.email, currency: "USD", paymentDetails: "" });
      }
      refreshFromStore();
      setAccount({ email: u.email, name: (u.user_metadata && u.user_metadata.name) || "" });
      setJustRegistered(false);
      setSession(true);
      return null;
    }
    if (!account) return "No account found on this device.";
    const h = await hashPw(password);
    if (email.trim().toLowerCase() !== account.email.toLowerCase() || h !== account.passwordHash)
      return "Email or password doesn't match.";
    setJustRegistered(false);
    setSession(true); saveKey("authSession", Boolean(remember));
    return null;
  };
  const onLogout = async () => {
    if (BACKEND) { try { await supa.auth.signOut(); } catch (e) {} clearStore(); }
    else { saveKey("authSession", false); }
    setSession(false); setAuthMode("login");
  };
  const onForgot = async (email) => {
    if (BACKEND) {
      if (!validEmail(email || "")) return "Type your email above first, then tap Forgot password.";
      const { error } = await supa.auth.resetPasswordForEmail(email.trim(), { redirectTo: window.location.href });
      if (error) return error.message;
      return "Check your email for a password reset link.";
    }
    setAccount(null); setSession(false); setAuthMode("landing");
    saveKey("authAccount", null); saveKey("authSession", false);
    return "";
  };
  const onSetNewPassword = async (pw) => {
    if (!BACKEND) return "Cloud accounts aren't set up.";
    const { error } = await supa.auth.updateUser({ password: pw });
    if (error) return error.message;
    setRecovery(false);
    return null;
  };

  const persistRoyalties = useCallback((next) => { setRoyalties(next); saveKey("royalties", next); }, []);
  const saveRoyalty = (r) => {
    const exists = royalties.some((x) => x.id === r.id);
    const next = exists ? royalties.map((x) => (x.id === r.id ? r : x)) : [r, ...royalties];
    persistRoyalties(next);
    setRoyaltyEditing(null);
  };
  const removeRoyalty = (id) => persistRoyalties(royalties.filter((x) => x.id !== id));

  const persistDeals = useCallback((next) => { setDeals(next); saveKey("deals", next); }, []);
  const saveDeal = (deal) => {
    const exists = deals.some((x) => x.id === deal.id);
    const next = exists ? deals.map((x) => (x.id === deal.id ? deal : x))
                        : [{ ...deal, createdAt: Date.now() }, ...deals];
    persistDeals(next);
    setEditing(null);
  };
  const removeDeal = (id) => persistDeals(deals.filter((x) => x.id !== id));
  const markPaid = (id) =>
    persistDeals(deals.map((x) => (x.id === id ? { ...x, status: "paid", paidDate: todayISO() } : x)));

  const metrics = useMemo(() => {
    let outstanding = 0, overdueSum = 0, overdueCount = 0, paid = 0, pipeline = 0;
    for (const d of deals) {
      const s = effectiveStatus(d);
      const fee = Number(d.fee || 0);
      if (s === "invoiced" || s === "overdue") outstanding += fee;
      if (s === "overdue") { overdueSum += fee; overdueCount++; }
      if (s === "paid") paid += fee;
      if (s === "lead" || s === "in_progress" || s === "delivered") pipeline += fee;
    }
    return { outstanding, overdueSum, overdueCount, paid, pipeline };
  }, [deals]);

  const visibleDeals = useMemo(() => {
    const q = query.trim().toLowerCase();
    return deals
      .filter((d) => {
        const s = effectiveStatus(d);
        if (filter === "all") return true;
        if (filter === "open") return s !== "paid";
        return s === filter;
      })
      .filter((d) => !q ||
        (d.clientName || "").toLowerCase().includes(q) ||
        (d.projectName || "").toLowerCase().includes(q))
      .sort((a, b) => {
        const rank = (d) => (effectiveStatus(d) === "overdue" ? 0 : effectiveStatus(d) === "invoiced" ? 1 : 2);
        return rank(a) - rank(b) || (b.createdAt || 0) - (a.createdAt || 0);
      });
  }, [deals, query, filter]);

  const cur = profile?.currency || "USD";

  if (loading)
    return (
      <div style={{ background: C.bg, color: C.faint, fontFamily: FONT_MONO, minHeight: "100vh" }}
        className="flex items-center justify-center text-sm">
        loading Producer Desk…
      </div>
    );

  if (recovery)
    return <RecoveryScreen onSet={onSetNewPassword} onCancel={() => setRecovery(false)} />;
  if (!session)
    return <AuthScreen key={authMode} mode={authMode} setMode={setAuthMode} account={account}
      defaultEmail={pendingEmail} justRegistered={justRegistered} backend={BACKEND}
      onRegister={onRegister} onLogin={onLogin} onForgot={onForgot} />;

  return (
    <div style={{ background: C.bg, color: C.ink, fontFamily: FONT_UI, minHeight: "100vh" }}>
      <PrintStyles />

      {/* ---------------- top bar ---------------- */}
      <header style={{ borderBottom: `1px solid ${C.line}`, background: C.panel }}
        className="px-4 py-3 flex items-center justify-between gap-3 sticky top-0 z-20" data-noprint>
        <div className="flex items-center gap-2.5 min-w-0">
          <div style={{ background: C.amber, color: C.bg }}
            className="w-8 h-8 rounded-md flex items-center justify-center shrink-0">
            <Disc3 size={18} strokeWidth={2.2} />
          </div>
          <div className="min-w-0">
            <div style={{ letterSpacing: "0.14em", fontSize: 13 }} className="font-semibold uppercase truncate">
              Producer Desk
            </div>
            <div style={{ color: C.faint, fontSize: 10, letterSpacing: "0.1em" }} className="uppercase truncate">
              {profile?.producerName || "Producer ledger"}
            </div>
          </div>
        </div>
        <button onClick={() => setShowProfile(true)}
          style={{ color: C.dim, border: `1px solid ${C.line}` }}
          className="p-2 rounded-md hover:opacity-80 shrink-0" aria-label="Settings">
          <Settings size={16} />
        </button>
      </header>

      {/* ---------------- master readout ---------------- */}
      <section className="px-4 pt-4" data-noprint>
        <div className="grid grid-cols-3 gap-2">
          <Readout label="Outstanding" value={fmtMoney(metrics.outstanding, cur)} accent={C.amber} />

function FilterRow({ filter, setFilter, deals }) {
  const counts = useMemo(() => {
    const c = { all: deals.length, open: 0, overdue: 0, invoiced: 0, paid: 0 };
    for (const d of deals) {
      const s = effectiveStatus(d);
      if (s !== "paid") c.open++;
      if (s === "overdue") c.overdue++;
      if (s === "invoiced") c.invoiced++;
      if (s === "paid") c.paid++;
    }
    return c;
  }, [deals]);
  const items = [
    ["all", "All"], ["open", "Open"], ["overdue", "Overdue"], ["invoiced", "Invoiced"], ["paid", "Paid"],
  ];
  return (
    <div className="flex gap-1.5 mb-3 overflow-x-auto pb-1" data-noprint>
      {items.map(([k, l]) => {
        const active = filter === k;
        const danger = k === "overdue" && counts.overdue > 0;
        return (
          <button key={k} onClick={() => setFilter(k)}
            style={{
              background: active ? (danger ? C.redSoft : C.raised) : "transparent",
              color: active ? (danger ? C.red : C.ink) : C.dim,
              border: `1px solid ${active ? (danger ? C.red : C.line) : C.line}`,
            }}
            className="px-3 py-1.5 rounded-full text-xs whitespace-nowrap shrink-0 font-medium">
            {l}{counts[k] != null && ` · ${counts[k]}`}
          </button>
        );
      })}
    </div>
  );
}

/* --------------------------- earnings --------------------------- */
function ymKey(iso) { return iso ? iso.slice(0, 7) : null; }
function monthLabel(ym) {
  const [y, m] = ym.split("-");
  return new Date(Number(y), Number(m) - 1, 1).toLocaleDateString(undefined, { month: "short" });
}

function EarningsView({ deals, royalties, cur, onAdd, onEdit, onDelete }) {
  const data = useMemo(() => {
    const paidDeals = deals.filter((d) => d.status === "paid");
    const feeTotal = paidDeals.reduce((s, d) => s + Number(d.fee || 0), 0);
    const royTotal = royalties.reduce((s, r) => s + Number(r.amount || 0), 0);
    const total = feeTotal + royTotal;
    const thisYear = String(new Date().getFullYear());

    // by source (fees + each royalty source)
    const bySource = [{ key: "fees", l: "Production fees", color: FEE_COLOR, amount: feeTotal }];
    for (const key of Object.keys(ROYALTY_SOURCES)) {
      const amt = royalties.filter((r) => r.source === key).reduce((s, r) => s + Number(r.amount || 0), 0);
      if (amt > 0) bySource.push({ key, l: ROYALTY_SOURCES[key].l, color: ROYALTY_SOURCES[key].color, amount: amt });
    }
    bySource.sort((a, b) => b.amount - a.amount);

    // last 6 months combined
    const months = [];
    const now = new Date();
    for (let i = 5; i >= 0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      months.push(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`);
    }
    const monthly = months.map((ym) => {
      const f = paidDeals.filter((d) => ymKey(d.paidDate) === ym).reduce((s, d) => s + Number(d.fee || 0), 0);
      const r = royalties.filter((x) => ymKey(x.date) === ym).reduce((s, x) => s + Number(x.amount || 0), 0);
      return { ym, label: monthLabel(ym), value: f + r };
    });

    const yearTotal =
      paidDeals.filter((d) => (d.paidDate || "").startsWith(thisYear)).reduce((s, d) => s + Number(d.fee || 0), 0) +
      royalties.filter((r) => (r.date || "").startsWith(thisYear)).reduce((s, r) => s + Number(r.amount || 0), 0);

    return { feeTotal, royTotal, total, yearTotal, bySource, monthly };
  }, [deals, royalties]);

  const maxMonth = Math.max(1, ...data.monthly.map((m) => m.value));
  const maxSource = Math.max(1, ...data.bySource.map((s) => s.amount));
  const sorted = [...royalties].sort((a, b) => (b.date || "").localeCompare(a.date || ""));

  return (
    <div className="flex flex-col gap-5">
      <div className="grid grid-cols-3 gap-2">
        <Readout label="Total earned" value={fmtMoney(data.total, cur)} accent={C.green} />
        <Readout label="This year" value={fmtMoney(data.yearTotal, cur)} accent={C.amber} />
        <Readout label="Back-end" value={fmtMoney(data.royTotal, cur)} accent={C.blue}
          sub="royalties vs fees" />
      </div>

      {/* monthly bars */}
      <Panel title="Last 6 months">
        {data.total === 0 ? (
          <Hint>Mark deals paid and log royalty payments to see your income build here.</Hint>
        ) : (
          <div className="flex items-end justify-between gap-2 h-32 pt-2">
            {data.monthly.map((m) => (
              <div key={m.ym} className="flex-1 flex flex-col items-center gap-1.5 h-full justify-end">
                <span style={{ color: C.faint, fontFamily: FONT_MONO, fontSize: 9 }}>
                  {m.value ? fmtMoney(Math.round(m.value), cur) : ""}
                </span>
                <div style={{ height: `${Math.max(2, (m.value / maxMonth) * 100)}%`, background: m.value ? C.amber : C.line, minHeight: 3 }}
                  className="w-full rounded-sm" />
                <span style={{ color: C.dim, fontSize: 10 }}>{m.label}</span>
              </div>
            ))}
          </div>
        )}
      </Panel>

      {/* by source */}
      <Panel title="Income by source">
        {data.bySource.filter((s) => s.amount > 0).length === 0 ? (
          <Hint>No income recorded yet.</Hint>
        ) : (
          <div className="flex flex-col gap-3 pt-1">
            {data.bySource.filter((s) => s.amount > 0).map((s) => (
              <div key={s.key}>
                <div className="flex justify-between items-baseline mb-1">
                  <span style={{ color: C.ink, fontSize: 12.5 }}>{s.l}</span>
                  <span style={{ color: C.ink, fontFamily: FONT_MONO, fontSize: 12.5 }}>{fmtMoney(s.amount, cur)}</span>
                </div>
                <div style={{ background: C.bg, border: `1px solid ${C.line}` }} className="h-2 rounded-full overflow-hidden">
                  <div style={{ width: `${(s.amount / maxSource) * 100}%`, background: s.color }} className="h-full" />
                </div>
              </div>
            ))}
          </div>
        )}
      </Panel>

      {/* logged royalty list */}
      <Panel title="Logged royalty payments"
        action={<button onClick={onAdd} style={{ color: C.amber, fontSize: 12 }} className="font-medium flex items-center gap-1"><Plus size={13} /> Log</button>}>
        {sorted.length === 0 ? (
          <Hint>Every royalty statement you receive — PRO, MLC, SoundExchange, distributor — log it here so your earnings reflect the back end, not just upfront fees.</Hint>
        ) : (
          <div className="flex flex-col gap-2 pt-1">
            {sorted.map((r) => {
              const src = ROYALTY_SOURCES[r.source] || ROYALTY_SOURCES.other;
              return (
                <div key={r.id} style={{ background: C.bg, border: `1px solid ${C.line}` }}
                  className="rounded-md px-3 py-2.5 flex items-center justify-between gap-2">
                  <div className="min-w-0">
                    <div className="flex items-center gap-2">
                      <span style={{ background: src.color }} className="w-2 h-2 rounded-full shrink-0" />
                      <span style={{ fontSize: 13 }} className="font-medium truncate">{src.l}</span>
                    </div>
                    <div style={{ color: C.faint, fontSize: 11, fontFamily: FONT_MONO }} className="mt-0.5 truncate">
                      {fmtDate(r.date)}{r.note ? ` · ${r.note}` : ""}
                    </div>
                  </div>
                  <div className="flex items-center gap-1 shrink-0">
                    <span style={{ color: C.green, fontFamily: FONT_MONO, fontSize: 14 }} className="font-semibold">
                      {fmtMoney(r.amount, cur)}
                    </span>
                    <button onClick={() => onEdit(r)} style={{ color: C.faint }} className="p-1.5"><Pencil size={13} /></button>
                    <button onClick={() => onDelete(r.id)} style={{ color: C.faint }} className="p-1.5"><Trash2 size={13} /></button>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </Panel>
    </div>
  );
}

/* ----------------------- stream estimator ----------------------- */
function StreamEstimator({ cur, rates, share, onRates, onShare }) {
  const [streams, setStreams] = useState("");
  const n = Math.max(0, Number(streams) || 0);
  const sharePct = Math.max(0, Math.min(100, Number(share) || 0));
  const setRate = (key, v) => onRates({ ...rates, [key]: v === "" ? "" : Number(v) });

  return (
    <div className="flex flex-col gap-5">
      <div>
        <h2 style={{ fontSize: 16 }} className="font-semibold mb-1">Royalty estimator</h2>
        <p style={{ color: C.dim, fontSize: 13 }} className="leading-relaxed">
          Rough payout for a given number of plays on each platform. Edit a rate to match what you actually see.
        </p>
      </div>

      <div className="grid grid-cols-2 gap-3">
        <Field label="Streams">
          <Input value={streams} onChange={setStreams} placeholder="100000" type="number" mono autoFocus />
        </Field>
        <Field label="Your master share %" hint="your points">
          <Input value={share} onChange={(v) => onShare(v === "" ? "" : Number(v))} placeholder="100" type="number" mono />
        </Field>
      </div>

      <div className="flex flex-col gap-2.5">
        {STREAM_PLATFORMS.map((p) => {
          const rate = rates[p.key] === "" ? 0 : Number(rates[p.key] ?? p.rate);
          const gross = n * rate;
          const cut = gross * (sharePct / 100);
          return (
            <div key={p.key} style={{ background: C.panel, border: `1px solid ${C.line}`, borderLeft: `3px solid ${p.color}` }}
              className="rounded-md p-3.5">
              <div className="flex items-center justify-between gap-3">
                <div className="flex items-center gap-2 min-w-0">
                  <span style={{ background: p.color }} className="w-2.5 h-2.5 rounded-full shrink-0" />
                  <span className="font-semibold truncate">{p.name}</span>
                </div>
                <div className="text-right">
                  <div style={{ color: C.ink, fontFamily: FONT_MONO, fontSize: 18 }} className="font-semibold leading-none">
                    {fmtMoney(gross, cur)}
                  </div>
                  <div style={{ color: C.green, fontFamily: FONT_MONO, fontSize: 11 }} className="mt-1">
                    your cut {fmtMoney(cut, cur)}
                  </div>
                </div>
              </div>
              <div style={{ borderTop: `1px solid ${C.line}` }} className="flex items-center justify-between gap-2 mt-3 pt-2.5">
                <span style={{ color: C.faint, fontSize: 11 }} className="uppercase tracking-wide">Rate / stream · {p.range}</span>
                <div className="flex items-center gap-1">
                  <span style={{ color: C.faint, fontFamily: FONT_MONO, fontSize: 13 }}>{CURRENCIES[cur] || "$"}</span>
                  <input value={rates[p.key] ?? p.rate} onChange={(e) => setRate(p.key, e.target.value)}
                    type="number" step="0.0001"
                    style={{ background: C.bg, border: `1px solid ${C.line}`, color: C.ink, fontFamily: FONT_MONO, fontSize: 13, width: 92 }}
                    className="rounded px-2 py-1 outline-none text-right" />
                </div>
              </div>
            </div>
          );
        })}
      </div>

      <div className="flex items-center justify-between">
        <button onClick={() => onRates(DEFAULT_RATES)}
          style={{ color: C.dim, border: `1px solid ${C.line}` }}
          className="px-3 py-1.5 rounded-md text-xs font-medium flex items-center gap-1.5">
          <RotateCcw size={13} /> Reset rates
        </button>

/* ------------------- publishing royalty calculator --------------- */
function PublishingCalc({ cur }) {
  const [streams, setStreams] = useState("");
  const [rate, setRate] = useState(0.001);
  const [writerShare, setWriterShare] = useState(50);
  const [selfPub, setSelfPub] = useState(true);

  const n = Math.max(0, Number(streams) || 0);
  const r = rate === "" ? 0 : Number(rate);
  const ws = Math.max(0, Math.min(100, Number(writerShare) || 0)) / 100;
  const gross = n * r;
  const writerPool = gross * 0.5;
  const publisherPool = gross * 0.5;
  const yourWriter = writerPool * ws;
  const yourPublisher = selfPub ? publisherPool * ws : 0;
  const yourTotal = yourWriter + yourPublisher;

  return (
    <div style={{ borderTop: `1px solid ${C.line}` }} className="pt-5 mt-1 flex flex-col gap-4">
      <div>
        <h3 style={{ fontSize: 15 }} className="font-semibold mb-1">Publishing royalties</h3>
        <p style={{ color: C.dim, fontSize: 13 }} className="leading-relaxed">
          The song side — what your writing and publishing earn, separate from the master payouts above. This is the
          mechanical + performance money your PRO and the MLC collect.
        </p>
      </div>

      <div className="grid grid-cols-2 gap-3">
        <Field label="Streams">
          <Input value={streams} onChange={setStreams} placeholder="100000" type="number" mono />
        </Field>
        <Field label="Your writer share %" hint="your cut of the song">
          <Input value={writerShare} onChange={(v) => setWriterShare(v === "" ? "" : Number(v))} placeholder="50" type="number" mono />
        </Field>
      </div>

      <div style={{ background: C.panel, border: `1px solid ${C.line}` }} className="rounded-md p-3.5 flex flex-col gap-3">
        <div className="flex items-center justify-between gap-2">
          <span style={{ color: C.faint, fontSize: 11 }} className="uppercase tracking-wide">Publishing / stream · ≈ $0.0006–0.0012</span>
          <div className="flex items-center gap-1">
            <span style={{ color: C.faint, fontFamily: FONT_MONO, fontSize: 13 }}>{CURRENCIES[cur] || "$"}</span>
            <input value={rate} onChange={(e) => setRate(e.target.value === "" ? "" : Number(e.target.value))}
              type="number" step="0.0001"
              style={{ background: C.bg, border: `1px solid ${C.line}`, color: C.ink, fontFamily: FONT_MONO, fontSize: 13, width: 92 }}
              className="rounded px-2 py-1 outline-none text-right" />
          </div>
        </div>
        <button onClick={() => setSelfPub((s) => !s)} className="flex items-center gap-2" type="button">
          <span style={{ background: selfPub ? C.amber : "transparent", border: `1px solid ${selfPub ? C.amber : C.line}`, color: C.bg, width: 18, height: 18 }}
            className="rounded flex items-center justify-center shrink-0">
            {selfPub && <Check size={13} strokeWidth={3} />}
          </span>
          <span style={{ color: C.dim, fontSize: 13 }}>I keep the publisher's share (self-published)</span>
        </button>
      </div>

      <div className="grid grid-cols-2 gap-2">
        <Readout label="Gross publishing" value={fmtMoney(gross, cur)} accent={C.ink} />
        <Readout label="Your total" value={fmtMoney(yourTotal, cur)} accent={C.ink} sub="writer + publisher" />
      </div>

      <div style={{ background: C.panel, border: `1px solid ${C.line}` }} className="rounded-md p-3.5 flex flex-col gap-2.5">
        <div className="flex items-center justify-between">
          <span style={{ color: C.dim, fontSize: 13 }}>Writer's share (50% of publishing)</span>
          <span style={{ color: C.ink, fontFamily: FONT_MONO, fontSize: 13 }}>{fmtMoney(yourWriter, cur)}</span>
        </div>
        <div className="flex items-center justify-between">
          <span style={{ color: C.dim, fontSize: 13 }}>Publisher's share (50% of publishing)</span>
          <span style={{ color: selfPub ? C.ink : C.faint, fontFamily: FONT_MONO, fontSize: 13 }}>
            {selfPub ? fmtMoney(yourPublisher, cur) : "to your publisher"}
          </span>
        </div>
      </div>

      <p style={{ color: C.faint, fontSize: 11.5 }} className="leading-relaxed">
        Rough estimate. A song's publishing splits 50% writer / 50% publisher as the standard starting point; real rates
        vary by country, your PRO, and the MLC. You only collect this if your works are registered — see the Royalties tab.
      </p>
    </div>
  );
}

/* ----------------------- AI contract reader --------------------- */
const CONTRACT_SYSTEM =
  "You explain music-industry contracts to producers in plain English. You are NOT a lawyer and do not give legal advice — you summarize and flag points to review. Read the pasted contract and return ONLY minified JSON (no markdown, no code fences, nothing before or after) with this exact shape: " +
  '{"dealType":string,"summary":string,"keyTerms":[{"label":string,"value":string}],"watchOuts":[string],"questions":[string],"bottomLine":string}. ' +
  "Rules: plain language a non-lawyer understands; accurate and neutral; summary 2-3 short sentences; max 6 keyTerms covering things like fee/advance, royalty or points, term length, territory, rights granted, master/publishing ownership, exclusivity, and credit; max 5 watchOuts (unusual, vague, or risky clauses); max 4 questions to ask before signing; bottomLine is one sentence. Keep every value short. If the text isn't a contract, set dealType to 'Not a contract' and say so in summary.";

const CONTRACT_NEG_SYSTEM =
  "You advise music producers on negotiating their own contracts. Based on the contract, suggest specific, realistic points the PRODUCER should push for in their favour. You are NOT a lawyer; these are practical suggestions, not legal advice. Return ONLY minified JSON (no markdown, no code fences): " +
  '{"negotiation":[{"point":string,"ask":string,"why":string}]}. ' +
  "point = the term/issue in a few words; ask = the specific change to request; why = the leverage or reason in one short sentence. Max 6 items, ordered by impact (biggest money or rights first). Favour standard, reasonable industry asks (more points, capped term, reversion of rights, kept publishing, guaranteed credit, clear payment timing, audit rights). If nothing is realistically negotiable or it isn't a contract, return an empty array.";

const NEG_TONES = [
  { v: "collaborative", l: "Collaborative", desc: "warm, partnership-focused" },
  { v: "firm", l: "Firm but friendly", desc: "polite but clear on the asks" },
  { v: "direct", l: "Direct", desc: "brief and to the point" },
];
function draftSystem(tone) {
  const t = NEG_TONES.find((x) => x.v === tone) || NEG_TONES[1];
  return (
    "You write short, professional negotiation messages a music producer can send to a label or artist about a deal. " +
    "You are not a lawyer. Tone: " + t.desc + ". Write a ready-to-send message that opens warmly, proposes the requested changes, gives a one-line reason for each, and ends on a positive, deal-friendly note. " +
    "Plain text only, no markdown, no headings, no bullet characters. Under 200 words. The only placeholders allowed are [Name] and [Your name]."
  );
}

}

function ContractReader({ text, setText, result, setResult }) {
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState("");
  const [negBusy, setNegBusy] = useState(false);
  const [draftBusy, setDraftBusy] = useState(false);
  const [selected, setSelected] = useState({});   // index -> bool
  const [tone, setTone] = useState("firm");
  const [copied, setCopied] = useState(false);
  const [llm, setLlm] = useState({ active: false, text: "", pct: 0 });

  const callClaude = async (system, content) => {
    const eng = await ensureEngine((r) => setLlm({ active: true, text: r.text || "Preparing the model…", pct: typeof r.progress === "number" ? r.progress : 0 }));
    setLlm((s) => ({ ...s, active: false }));
    const reply = await eng.chat.completions.create({
      messages: [{ role: "system", content: system }, { role: "user", content: content }],
      temperature: 0.2,
      max_tokens: 1024,
    });
    return ((reply.choices && reply.choices[0] && reply.choices[0].message.content) || "").trim();
  };
  const parseJSON = (raw) => {
    let clean = raw.replace(/```json/gi, "").replace(/```/g, "").trim();
    const a = clean.indexOf("{"), b = clean.lastIndexOf("}");
    if (a >= 0 && b > a) clean = clean.slice(a, b + 1);
    try { return JSON.parse(clean); } catch (e) { return null; }
  };

  const analyze = async () => {
    if (text.trim().length < 40) { setError("Paste the full contract text first."); return; }
    if (!webgpuOK()) { setError("This browser can't run the in-browser AI — it needs WebGPU. Try Chrome or Edge on desktop."); return; }
    setError(""); setBusy(true); setResult(null); setSelected({});
    try {
      const raw = await callClaude(CONTRACT_SYSTEM, text.slice(0, 8000));
      setResult(parseJSON(raw) || { raw: raw || "No readable response." });
    } catch (e) { setError(e.message === "nogpu" ? "This browser can't run the AI (needs WebGPU)." : "The on-device model couldn't finish. Reload the page and try again."); }
    setBusy(false);
  };

  const suggest = async () => {
    setError(""); setNegBusy(true);
    try {
      const raw = await callClaude(CONTRACT_NEG_SYSTEM, text.slice(0, 8000));
      const parsed = parseJSON(raw);
      const negotiation = (parsed && Array.isArray(parsed.negotiation)) ? parsed.negotiation : [];
      setResult({ ...result, negotiation, draft: undefined });
      setSelected(negotiation.reduce((o, _, i) => ((o[i] = true), o), {}));
    } catch (e) { setError(e.message === "nogpu" ? "This browser can't run the AI (needs WebGPU)." : "The on-device model couldn't finish. Try again."); }
    setNegBusy(false);
  };

  const draft = async () => {
    const picks = (result.negotiation || []).filter((_, i) => selected[i]);
    if (picks.length === 0) { setError("Pick at least one point to negotiate."); return; }
    setError(""); setDraftBusy(true);
    try {
      const ctx =
        `This is about a ${result.dealType || "music contract"}. The producer wants to negotiate:\n` +
        picks.map((p) => `- ${p.ask} (because ${p.why})`).join("\n");
      const msg = await callClaude(draftSystem(tone), ctx);
      setResult({ ...result, draft: msg });
    } catch (e) { setError(e.message === "nogpu" ? "This browser can't run the AI (needs WebGPU)." : "The on-device model couldn't finish. Try again."); }
    setDraftBusy(false);
  };

  const copyDraft = async () => {
    try { await navigator.clipboard.writeText(result.draft); setCopied(true); setTimeout(() => setCopied(false), 1500); }
    catch (e) { /* fall back to manual select */ }
  };

  const toggle = (i) => setSelected((s) => ({ ...s, [i]: !s[i] }));
  const hasNeg = result && Array.isArray(result.negotiation);
  const structured = result && !result.raw;

  return (
    <div className="flex flex-col gap-4">
      <div>
        <h2 style={{ fontSize: 16 }} className="font-semibold mb-1 flex items-center gap-1.5">
          <Sparkles size={16} style={{ color: C.amber }} /> Contract helper
        </h2>
        <p style={{ color: C.dim, fontSize: 13 }} className="leading-relaxed">
          Paste a producer agreement, beat licence, or split sheet. Get it in plain English, then see what to negotiate
          and draft a reply.
        </p>
      </div>

      <AiBar llm={llm} />

      <textarea value={text} onChange={(e) => setText(e.target.value)}
        rows={7} placeholder="Paste the contract text here…"
        style={{ background: C.bg, border: `1px solid ${C.line}`, color: C.ink, fontSize: 13.5, lineHeight: 1.5 }}
        className="w-full rounded-md px-3 py-3 outline-none resize-y" />

      <div className="flex items-center gap-2">
        <button onClick={analyze} disabled={busy}
          style={{ background: C.amber, color: C.bg, opacity: busy ? 0.7 : 1 }}
          className="flex-1 py-3 rounded-md font-semibold flex items-center justify-center gap-2">
          {busy ? <><Loader2 size={17} className="animate-spin" /> Reading…</> : <><Sparkles size={17} /> Explain this contract</>}
        </button>
        {(text || result) && (
          <button onClick={() => { setText(""); setResult(null); setError(""); setSelected({}); }}
            style={{ color: C.dim, border: `1px solid ${C.line}` }} className="px-3 py-3 rounded-md">
            <X size={16} />
          </button>
        )}
      </div>

      {error && (
        <div style={{ color: C.red, fontSize: 12.5 }} className="flex items-center gap-1.5">
          <AlertTriangle size={14} /> {error}
        </div>
      )}

      {result && <ContractResult result={result} />}

      {/* ---- negotiation suggestions ---- */}
      {structured && (
        <div className="flex flex-col gap-3">
          {!hasNeg ? (
            <button onClick={suggest} disabled={negBusy}
              style={{ border: `1px solid ${C.amber}`, color: C.amber, opacity: negBusy ? 0.6 : 1 }}
              className="py-3 rounded-md font-semibold flex items-center justify-center gap-2">
              {negBusy ? <><Loader2 size={16} className="animate-spin" /> Thinking…</> : <><Scale size={16} /> Suggest what to negotiate</>}
            </button>
          ) : result.negotiation.length === 0 ? (
            <Panel title="Negotiation"><Hint>No strong negotiation points stood out — or this isn't a contract Claude could read terms from.</Hint></Panel>
          ) : (
            <>
              <div>
                <div className="flex items-center justify-between mb-2">
                  <span style={{ color: C.dim, fontSize: 11, letterSpacing: "0.1em" }} className="uppercase font-semibold">What to negotiate</span>
                  <span style={{ color: C.faint, fontSize: 11 }}>tap to include</span>
                </div>
                <div className="flex flex-col gap-2">
                  {result.negotiation.map((p, i) => {
                    const on = !!selected[i];
                    return (
                      <button key={i} onClick={() => toggle(i)}
                        style={{ background: C.panel, border: `1px solid ${on ? C.amber : C.line}`, textAlign: "left" }}
                        className="rounded-md p-3.5 flex gap-3">
                        <span style={{
                          background: on ? C.amber : "transparent", border: `1px solid ${on ? C.amber : C.line}`,
                          color: C.bg, width: 18, height: 18,
                        }} className="rounded flex items-center justify-center shrink-0 mt-0.5">
                          {on && <Check size={13} strokeWidth={3} />}
                        </span>
                        <div className="min-w-0">
                          <div style={{ fontSize: 13.5 }} className="font-semibold">{p.point}</div>
                          <div style={{ color: C.ink, fontSize: 13 }} className="mt-0.5 leading-snug">{p.ask}</div>
                          <div style={{ color: C.faint, fontSize: 12 }} className="mt-1 leading-snug">{p.why}</div>
                        </div>
                      </button>
                    );
                  })}
                </div>
              </div>

              {/* draft option */}
              <div style={{ background: C.panel, border: `1px solid ${C.line}` }} className="rounded-md p-3.5">
                <div style={{ color: C.dim, fontSize: 11, letterSpacing: "0.08em" }} className="uppercase font-semibold mb-2 flex items-center gap-1.5">
                  <MessageSquare size={13} /> Draft a negotiation message
                </div>
                <div className="flex gap-1.5 mb-3">
                  {NEG_TONES.map((t) => (
                    <button key={t.v} onClick={() => setTone(t.v)}
                      style={{ background: tone === t.v ? C.raised : "transparent", color: tone === t.v ? C.ink : C.faint, border: `1px solid ${C.line}`, fontSize: 12 }}
                      className="flex-1 py-2 rounded font-medium">{t.l}</button>
                  ))}
                </div>
                <button onClick={draft} disabled={draftBusy}
                  style={{ background: C.amber, color: C.bg, opacity: draftBusy ? 0.7 : 1 }}
                  className="w-full py-2.5 rounded-md font-semibold flex items-center justify-center gap-2">
                  {draftBusy ? <><Loader2 size={16} className="animate-spin" /> Writing…</> : <>{result.draft ? "Redraft message" : "Draft message"}</>}
                </button>

                {result.draft && (
                  <div className="mt-3">
                    <textarea readOnly value={result.draft} rows={9}
                      style={{ background: C.bg, border: `1px solid ${C.line}`, color: C.ink, fontSize: 13, lineHeight: 1.55 }}
                      className="w-full rounded-md px-3 py-3 outline-none resize-y" />
                    <button onClick={copyDraft}
                      style={{ color: copied ? C.green : C.amber, border: `1px solid ${C.line}` }}
                      className="mt-2 px-3 py-1.5 rounded-md text-xs font-medium flex items-center gap-1.5">
                      {copied ? <><Check size={13} /> Copied</> : <><Copy size={13} /> Copy message</>}
                    </button>
                  </div>
                )}
              </div>
            </>
          )}
        </div>
      )}

      <p style={{ color: C.faint, fontSize: 11.5 }} className="leading-relaxed">
        Plain-English summaries and practical suggestions — not legal advice. For anything you're unsure about, have a
        music lawyer review it. Everything runs on your device — your contract text never leaves your browser.
      </p>
    </div>
  );
}

        </Field>
      </div>

      <Field label={f.status === "paid" ? "Paid date" : "Payment due"}>
        <Input value={f.status === "paid" ? f.paidDate : f.dueDate}
          onChange={(v) => set(f.status === "paid" ? "paidDate" : "dueDate", v)} type="date" mono />
      </Field>

      <Field label="Notes">
        <textarea value={f.notes} onChange={(e) => set("notes", e.target.value)}
          rows={2} placeholder="Deal terms, contract status, who to chase…"
          style={{ background: C.bg, border: `1px solid ${C.line}`, color: C.ink, fontSize: 14 }}
          className="w-full rounded-md px-3 py-2.5 outline-none resize-none" />
      </Field>

      <div className="flex gap-2 pt-2">
        <button onClick={onClose} style={{ border: `1px solid ${C.line}`, color: C.dim }} className="flex-1 py-3 rounded-md font-medium">
          Cancel
        </button>
        <button onClick={() => valid && onSave(f)} disabled={!valid}
          style={{ background: valid ? C.amber : C.raised, color: valid ? C.bg : C.faint }}
          className="flex-1 py-3 rounded-md font-semibold">
          {isNew ? "Add deal" : "Save"}
        </button>
      </div>
    </Sheet>
  );
}

/* --------------------------- invoice ---------------------------- */
function InvoiceView({ deal, profile, cur, onClose }) {
  const invNo = useMemo(() =>
    `INV-${(deal.createdAt ? new Date(deal.createdAt) : new Date()).getFullYear()}-${deal.id.slice(-5).toUpperCase()}`,
    [deal]);
  const p = profile || {};
  return (
    <Sheet title="Invoice" onClose={onClose} wide
      footer={
        <button onClick={() => window.print()} style={{ background: C.amber, color: C.bg }}
          className="w-full py-3 rounded-md font-semibold flex items-center justify-center gap-2" data-noprint>
          <Printer size={17} /> Print / Save as PDF
        </button>
      }>
      <div id="invoice-print" style={{ background: "#fff", color: "#1a1a1a", fontFamily: FONT_UI }}
        className="rounded-lg p-6 print-area">
        <div className="flex justify-between items-start mb-6">
          <div>
            <div style={{ letterSpacing: "0.12em", color: "#111" }} className="text-lg font-bold uppercase">
              {p.businessName || p.producerName || "Your studio"}
            </div>
            {p.producerName && p.businessName && <div style={{ color: "#555" }} className="text-sm">{p.producerName}</div>}
            {p.email && <div style={{ color: "#555" }} className="text-sm">{p.email}</div>}
          </div>
          <div className="text-right">
            <div style={{ color: "#888", letterSpacing: "0.1em" }} className="text-xs uppercase">Invoice</div>
            <div style={{ fontFamily: FONT_MONO }} className="text-sm font-semibold">{invNo}</div>
            <div style={{ color: "#888", fontFamily: FONT_MONO }} className="text-xs mt-1">{fmtDate(todayISO())}</div>
          </div>
        </div>

        <div className="grid grid-cols-2 gap-4 mb-6">
          <div>
            <div style={{ color: "#999", letterSpacing: "0.08em" }} className="text-xs uppercase mb-1">Bill to</div>
            <div className="font-semibold">{deal.clientName}</div>
            {deal.clientEmail && <div style={{ color: "#555" }} className="text-sm">{deal.clientEmail}</div>}
          </div>
          <div className="text-right">
            <div style={{ color: "#999", letterSpacing: "0.08em" }} className="text-xs uppercase mb-1">Due</div>
            <div style={{ fontFamily: FONT_MONO }} className="font-semibold">{fmtDate(deal.dueDate) || "On receipt"}</div>
          </div>
        </div>

        <table className="w-full mb-6" style={{ borderCollapse: "collapse" }}>
          <thead>
            <tr style={{ borderBottom: "2px solid #1a1a1a" }}>
              <th style={{ color: "#666", letterSpacing: "0.06em" }} className="text-left text-xs uppercase py-2">Description</th>
              <th style={{ color: "#666", letterSpacing: "0.06em" }} className="text-right text-xs uppercase py-2">Amount</th>
            </tr>
          </thead>
          <tbody>
            <tr style={{ borderBottom: "1px solid #e5e5e5" }}>
              <td className="py-3">
                <div className="font-medium">{workLabel(deal.workType)}</div>
                {deal.projectName && <div style={{ color: "#777" }} className="text-sm">{deal.projectName}</div>}
                {(deal.masterSplit || deal.publishingSplit) ? (
                  <div style={{ color: "#999" }} className="text-xs mt-1">
                    Splits — master {Number(deal.masterSplit || 0)}% · publishing {Number(deal.publishingSplit || 0)}%
                  </div>
                ) : null}
              </td>
              <td style={{ fontFamily: FONT_MONO }} className="text-right align-top py-3">{fmtMoney(deal.fee, cur)}</td>
            </tr>
          </tbody>
        </table>

        <div className="flex justify-end mb-6">
          <div style={{ borderTop: "2px solid #1a1a1a" }} className="w-1/2 pt-2 flex justify-between">
            <span className="font-bold uppercase text-sm">Total due</span>
            <span style={{ fontFamily: FONT_MONO }} className="font-bold">{fmtMoney(deal.fee, cur)}</span>
          </div>
        </div>

        {p.paymentDetails && (
          <div style={{ borderTop: "1px solid #e5e5e5" }} className="pt-4">
            <div style={{ color: "#999", letterSpacing: "0.08em" }} className="text-xs uppercase mb-1">Payment details</div>
            <div style={{ color: "#444", whiteSpace: "pre-wrap" }} className="text-sm">{p.paymentDetails}</div>
          </div>
        )}
        {!p.paymentDetails && (
          <div style={{ color: "#bbb" }} className="text-xs italic" data-noprint>
            Tip: add bank / PayPal details in settings so they appear here.
          </div>
        )}
      </div>
    </Sheet>
  );
}

/* --------------------------- profile ---------------------------- */
function ProfileEditor({ profile, account, onLogout, onClose, onSave }) {
  const [f, setF] = useState({
    producerName: profile?.producerName || "",
    businessName: profile?.businessName || "",
    email: profile?.email || "",
    currency: profile?.currency || "USD",
    paymentDetails: profile?.paymentDetails || "",
  });
  const set = (k, v) => setF((p) => ({ ...p, [k]: v }));
  const valid = f.producerName.trim() || f.businessName.trim();
  const firstRun = !profile;

  return (
    <Sheet title={firstRun ? "Set up your desk" : "Settings"} onClose={firstRun ? null : onClose}>
      {firstRun && (
        <p style={{ color: C.dim, fontSize: 13 }} className="mb-2 leading-relaxed">
          This appears on your invoices and sets your default currency. You can change it anytime.
        </p>
      )}
      <Field label="Your name / producer name">
        <Input value={f.producerName} onChange={(v) => set("producerName", v)} placeholder="Prod. by you" autoFocus />
      </Field>
      <Field label="Business name (optional)">
        <Input value={f.businessName} onChange={(v) => set("businessName", v)} placeholder="Studio LLC" />
      </Field>
      <Field label="Email">
        <Input value={f.email} onChange={(v) => set("email", v)} placeholder="you@studio.com" type="email" />
      </Field>
      <Field label="Default currency">
        <Select value={f.currency} onChange={(v) => set("currency", v)}
          options={Object.keys(CURRENCIES).map((k) => [k, `${k} ${CURRENCIES[k]}`])} />
      </Field>
      <Field label="Payment details" hint="shown on invoices">
        <textarea value={f.paymentDetails} onChange={(e) => set("paymentDetails", e.target.value)}
          rows={3} placeholder={"Bank: …\nPayPal: …\nNet 30"}
          style={{ background: C.bg, border: `1px solid ${C.line}`, color: C.ink, fontSize: 14 }}
          className="w-full rounded-md px-3 py-2.5 outline-none resize-none" />
      </Field>
      <button onClick={() => valid && onSave(f)} disabled={!valid}
        style={{ background: valid ? C.amber : C.raised, color: valid ? C.bg : C.faint }}
        className="w-full py-3 rounded-md font-semibold mt-2">
        {firstRun ? "Start tracking" : "Save settings"}
      </button>

      {account && (
        <div style={{ borderTop: `1px solid ${C.line}` }} className="pt-3 mt-1">
          <div style={{ color: C.faint, fontSize: 11, letterSpacing: "0.06em" }} className="uppercase mb-1">Account</div>
          <div className="flex items-center justify-between gap-2">
            <span style={{ color: C.dim, fontSize: 13 }} className="truncate">{account.email}</span>
            <button onClick={onLogout} style={{ color: C.red, border: `1px solid ${C.line}` }}
              className="px-3 py-1.5 rounded-md text-xs font-medium flex items-center gap-1.5 shrink-0">
              <LogOut size={13} /> Log out
            </button>
          </div>
        </div>
      )}
    </Sheet>
  );
}

/* --------------------------- primitives ------------------------- */
function Sheet({ title, onClose, children, footer, wide }) {
  return (
    <div className="fixed inset-0 z-40 flex items-end sm:items-center justify-center" data-noprint>
      <div onClick={onClose} style={{ background: "rgba(0,0,0,0.6)" }} className="absolute inset-0" />
      <div style={{ background: C.panel, border: `1px solid ${C.line}`, maxHeight: "92vh" }}
        className={`relative w-full ${wide ? "sm:max-w-lg" : "sm:max-w-md"} sm:rounded-xl rounded-t-2xl flex flex-col`}>
        <div style={{ borderBottom: `1px solid ${C.line}` }} className="flex items-center justify-between px-4 py-3 shrink-0">
          <span style={{ letterSpacing: "0.06em", fontSize: 13 }} className="uppercase font-semibold">{title}</span>
          {onClose && <button onClick={onClose} style={{ color: C.faint }} className="p-1"><X size={18} /></button>}
        </div>
        <div className="overflow-y-auto px-4 py-4 flex flex-col gap-3">{children}</div>
        {footer && <div style={{ borderTop: `1px solid ${C.line}` }} className="px-4 py-3 shrink-0">{footer}</div>}
      </div>
    </div>
  );
}

function Field({ label, hint, children }) {
  return (
    <label className="block">
      <div className="flex items-baseline justify-between mb-1.5">
        <span style={{ color: C.dim, fontSize: 11, letterSpacing: "0.06em" }} className="uppercase">{label}</span>
        {hint && <span style={{ color: C.faint, fontSize: 10 }}>{hint}</span>}
      </div>
      {children}
    </label>
  );
}

function Input({ value, onChange, placeholder, type = "text", autoFocus, mono }) {
  return (
    <input type={type} value={value} placeholder={placeholder} autoFocus={autoFocus}
      onChange={(e) => onChange(e.target.value)}
      style={{ background: C.bg, border: `1px solid ${C.line}`, color: C.ink, fontSize: 14,
        fontFamily: mono ? FONT_MONO : FONT_UI }}
      className="w-full rounded-md px-3 py-2.5 outline-none" />
  );
}

function Select({ value, onChange, options }) {
  return (
    <select value={value} onChange={(e) => onChange(e.target.value)}
      style={{ background: C.bg, border: `1px solid ${C.line}`, color: C.ink, fontSize: 14 }}
      className="w-full rounded-md px-3 py-2.5 outline-none appearance-none">
      {options.map(([v, l]) => <option key={v} value={v} style={{ background: C.panel }}>{l}</option>)}
    </select>
  );
}

function Segmented({ options, value, onChange }) {
  return (
    <div style={{ background: C.bg, border: `1px solid ${C.line}` }} className="flex rounded-md p-0.5">
      {options.map(([v, l]) => (
        <button key={v} onClick={() => onChange(v)}
          style={{ background: value === v ? C.raised : "transparent", color: value === v ? C.ink : C.faint, fontSize: 13 }}
          className="flex-1 py-2 rounded font-medium">{l}</button>
      ))}
    </div>
  );
}

function PrintStyles() {
  return (
    <style>{`
      @media print {
        body * { visibility: hidden !important; }
        #invoice-print, #invoice-print * { visibility: visible !important; }
        #invoice-print { position: absolute; left: 0; top: 0; width: 100%; border-radius: 0 !important; }
        [data-noprint] { display: none !important; }
      }
      select option { color: #ECE7D9; }
    `}</style>
  );
}

const rootEl = document.getElementById("root");
rootEl.innerHTML = "";
createRoot(rootEl).render(<App />);

</script>
</body>
</html>
